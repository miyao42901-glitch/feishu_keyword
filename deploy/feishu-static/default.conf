charset utf-8;
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

# 与 docker-compose 同栈服务名（proxy 网络）；仅 feishu profile 时 /api/v1 会 502，需同时起 api / sync-api（worker）
upstream feishu_stack_api {
    server api:8000;
}

upstream feishu_stack_sync {
    server sync-api:8765;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 采集 / 异步任务（必须写在 /api/ 之前）
    location /api/v1/ {
        proxy_pass http://feishu_stack_sync;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 飞书任务配置等（server/）
    location /api/ {
        proxy_pass http://feishu_stack_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # YDDM 登录 / 计费（去掉 /yddm-api 前缀）
    location /yddm-api/ {
        proxy_pass https://api.yddm.com/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host api.yddm.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}

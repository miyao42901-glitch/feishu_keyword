# 正式栈 Traefik 标签（字面量域名与 router 名）

services:
  api:
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.fkw-api-prod.loadbalancer.server.port=8000
      - traefik.http.routers.fkw-api-prod.rule=Host(`fskw.tbpf.com`)
      - traefik.http.routers.fkw-api-prod.entrypoints=websecure
      - traefik.http.routers.fkw-api-prod.tls.certresolver=dnspod
      - traefik.http.routers.fkw-api-prod.tls.domains[0].main=tbpf.com
      - traefik.http.routers.fkw-api-prod.tls.domains[0].sans=*.tbpf.com
      - traefik.http.routers.fkw-api-prod.service=fkw-api-prod

  admin-web:
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.fkw-admin-prod.loadbalancer.server.scheme=http
      - traefik.http.services.fkw-admin-prod.loadbalancer.server.port=80
      - traefik.http.routers.fkw-admin-prod.rule=Host(`fskw-admin.tbpf.com`)
      - traefik.http.routers.fkw-admin-prod.entrypoints=websecure
      - traefik.http.routers.fkw-admin-prod.tls.certresolver=dnspod
      - traefik.http.routers.fkw-admin-prod.tls.domains[0].main=tbpf.com
      - traefik.http.routers.fkw-admin-prod.tls.domains[0].sans=*.tbpf.com
      - traefik.http.routers.fkw-admin-prod.service=fkw-admin-prod

  feishu-web:
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.fkw-feishu-prod.loadbalancer.server.scheme=http
      - traefik.http.services.fkw-feishu-prod.loadbalancer.server.port=80
      - traefik.http.routers.fkw-feishu-prod.rule=Host(`fskw-feishu.tbpf.com`)
      - traefik.http.routers.fkw-feishu-prod.entrypoints=websecure
      - traefik.http.routers.fkw-feishu-prod.tls.certresolver=dnspod
      - traefik.http.routers.fkw-feishu-prod.tls.domains[0].main=tbpf.com
      - traefik.http.routers.fkw-feishu-prod.tls.domains[0].sans=*.tbpf.com
      - traefik.http.routers.fkw-feishu-prod.service=fkw-feishu-prod

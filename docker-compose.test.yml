# 测试栈 Traefik 标签（字面量域名与 router 名）

services:
  api:
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.fkw-api-test.loadbalancer.server.port=8000
      - traefik.http.routers.fkw-api-test.rule=Host(`fskw-test.tbpf.com`) && PathPrefix(`/api`)
      - traefik.http.routers.fkw-api-test.entrypoints=websecure
      - traefik.http.routers.fkw-api-test.tls.certresolver=dnspod
      - traefik.http.routers.fkw-api-test.tls.domains[0].main=tbpf.com
      - traefik.http.routers.fkw-api-test.tls.domains[0].sans=*.tbpf.com
      - traefik.http.routers.fkw-api-test.service=fkw-api-test

  admin-web:
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.fkw-admin-test.loadbalancer.server.scheme=http
      - traefik.http.services.fkw-admin-test.loadbalancer.server.port=80
      - traefik.http.routers.fkw-admin-test.rule=Host(`fskw-admin-test.tbpf.com`)
      - traefik.http.routers.fkw-admin-test.entrypoints=websecure
      - traefik.http.routers.fkw-admin-test.tls.certresolver=dnspod
      - traefik.http.routers.fkw-admin-test.tls.domains[0].main=tbpf.com
      - traefik.http.routers.fkw-admin-test.tls.domains[0].sans=*.tbpf.com
      - traefik.http.routers.fkw-admin-test.service=fkw-admin-test

  feishu-web:
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.fkw-feishu-test.loadbalancer.server.scheme=http
      - traefik.http.services.fkw-feishu-test.loadbalancer.server.port=80
      - traefik.http.routers.fkw-feishu-test.rule=Host(`fskw-feishu-test.tbpf.com`)
      - traefik.http.routers.fkw-feishu-test.entrypoints=websecure
      - traefik.http.routers.fkw-feishu-test.tls.certresolver=dnspod
      - traefik.http.routers.fkw-feishu-test.tls.domains[0].main=tbpf.com
      - traefik.http.routers.fkw-feishu-test.tls.domains[0].sans=*.tbpf.com
      - traefik.http.routers.fkw-feishu-test.service=fkw-feishu-test

# feishu_keyword：Shell Runner 编译 admin/feishu → tar + scp → SSH docker compose
# test 分支：推送即自动 deploy-test（/docker/feishu_keyword-test）
# master 分支：MR 合并后在 GitLab 手动 deploy-prod（/docker/feishu_keyword）
# 变量：SSH_PRIVATE_KEY、HOST_IP（默认 121.43.231.225）

variables:
  HOST_IP: "121.43.231.225"
  SSH_PORT: "22"
  SSH_USER: "root"
  PROD_ROOT: "/docker/feishu_keyword"
  TEST_ROOT: "/docker/feishu_keyword-test"
  SSH_OPTS: "-o ServerAliveInterval=30 -o ServerAliveCountMax=6"
  PKG_NAME: "deploy.pkg.tar.gz"
  COMPOSE_PROFILES: "--profile admin --profile feishu --profile worker"

stages:
  - deploy
  - cleanup

.ssh-setup:
  before_script:
    - |
      if ! command -v ssh >/dev/null 2>&1 || ! command -v scp >/dev/null 2>&1; then
        ( command -v apt-get >/dev/null 2>&1 && apt-get update -qq && apt-get install -y -qq openssh-client >/dev/null 2>&1 ) \
          || ( command -v apk >/dev/null 2>&1 && apk add --no-cache openssh-client >/dev/null 2>&1 ) \
          || true
      fi
    - eval $(ssh-agent -s)
    - |
      if [ -f "$SSH_PRIVATE_KEY" ]; then
        chmod 600 "$SSH_PRIVATE_KEY"
        ssh-add "$SSH_PRIVATE_KEY"
      else
        SSH_KEY_FILE=$(mktemp)
        printf '%s\n' "$SSH_PRIVATE_KEY" > "$SSH_KEY_FILE"
        chmod 600 "$SSH_KEY_FILE"
        ssh-add "$SSH_KEY_FILE"
        rm -f "$SSH_KEY_FILE"
      fi
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -p "$SSH_PORT" "$HOST_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
    - chmod 644 ~/.ssh/known_hosts
  after_script:
    - chmod -R u+w .cache 2>/dev/null || true
    - rm -rf .cache 2>/dev/null || true
    - eval $(ssh-agent -k) 2>/dev/null || true

.deploy-template:
  extends: .ssh-setup
  stage: deploy
  timeout: 45m
  script:
    - |
      if [ -z "${HOST_IP:-}" ]; then
        echo "ERROR: 请配置 CI 变量 HOST_IP"
        exit 1
      fi
    - echo "部署开始 → $DEPLOY_ROOT @ $HOST_IP ($DEPLOY_ENV)"
    - chmod -R u+w .cache 2>/dev/null || true
    - rm -rf .cache 2>/dev/null || true
    - bash scripts/ci-build-frontend.sh "$DEPLOY_ENV"
    - |
      DEPLOY_TS=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
      DEPLOY_TAG=$(date -u +'%Y-%m-%d_%H-%M-%S')
      mkdir -p deploy
      {
        echo "build=${DEPLOY_TAG}_${CI_COMMIT_SHORT_SHA}"
        echo "commit=${CI_COMMIT_SHORT_SHA}"
        echo "branch=${CI_COMMIT_BRANCH}"
        echo "deployed_at=${DEPLOY_TS}"
        echo "environment=${CI_ENVIRONMENT_NAME:-unknown}"
        echo "pipeline=${CI_PIPELINE_ID}"
      } > deploy/BUILD_INFO
      cp deploy/BUILD_INFO server/BUILD_INFO
      cat deploy/BUILD_INFO
    - bash scripts/ci-pack-deploy.sh "$DEPLOY_ENV"
    - |
      echo ">>> scp 开始 $(date -u +%Y-%m-%dT%H:%M:%SZ) → $SSH_USER@$HOST_IP:$DEPLOY_ROOT"
      scp $SSH_OPTS -P "$SSH_PORT" "$PKG_NAME" "$SSH_USER@$HOST_IP:$DEPLOY_ROOT/$PKG_NAME"
      echo ">>> scp 完成 $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - |
      sed '1s/^\xEF\xBB\xBF//' scripts/ci-deploy-remote.sh | \
        ssh $SSH_OPTS -p "$SSH_PORT" "$SSH_USER@$HOST_IP" \
        "DEPLOY_ROOT=$DEPLOY_ROOT ENV_FILE=$ENV_FILE COMPOSE_PROFILES='$COMPOSE_PROFILES' PKG_NAME=$PKG_NAME bash -s"

deploy-test:
  extends: .deploy-template
  variables:
    CI_ENVIRONMENT_NAME: test
    DEPLOY_ROOT: "/docker/feishu_keyword-test"
    DEPLOY_ENV: test
    ENV_FILE: .env.test
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      when: on_success

deploy-prod:
  extends: .deploy-template
  resource_group: feishu-keyword-docker-prod-121
  variables:
    CI_ENVIRONMENT_NAME: production
    DEPLOY_ROOT: "/docker/feishu_keyword"
    DEPLOY_ENV: prod
    ENV_FILE: .env.master
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual

cleanup:
  stage: cleanup
  script:
    - echo "清理完成"
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "test"
  allow_failure: true

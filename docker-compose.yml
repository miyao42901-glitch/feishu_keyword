# feishu_keyword Docker 编排（真源在仓库根；主机复制到如 /docker/feishu_keyword）。
#
# 常用：docker compose --profile db --profile admin up -d --build
# 仅 API：docker compose up -d --build
#
# 前置：docker network create proxy（与主机 Traefik 共用 external 网络名 proxy）
# 栈根 `${VAR}` 插值读取 ./.env；部署后务必 cp -f server/.env .env，否则 Traefik Host、路由名等可能缺失。
# mysql / redis 镜像名写在本文件；换 tag 时改 image 行即可。

services:
  mysql:
    profiles: ["db"]
    image: mysql:8.0
    container_name: fkw-mysql
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DB:-feishu_keyword}
      MYSQL_USER: ${MYSQL_USER:?set MYSQL_USER in server/.env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in server/.env}
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
        "--default-authentication-plugin=mysql_native_password",
      ]
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./server/deploy/docker/mysql-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    networks:
      - proxy

  redis:
    profiles: ["db"]
    image: redis:alpine
    container_name: fkw-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - proxy

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    container_name: fkw-api
    restart: unless-stopped
    env_file:
      - ./server/.env
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.fkw-api.loadbalancer.server.port=8000
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.rule=Host(`${API_PUBLIC_HOST:?}`) && PathPrefix(`/api`)
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.tls.certresolver=dnspod
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.service=fkw-api

  admin-web:
    profiles: ["admin"]
    image: nginx:alpine
    container_name: fkw-admin-web
    restart: unless-stopped
    volumes:
      - ./public/admin:/usr/share/nginx/html:ro
      - ./deploy/admin-static/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.middlewares.fkw-admin-strip.stripprefix.prefixes=/admin
      - traefik.http.services.fkw-admin-web.loadbalancer.server.scheme=http
      - traefik.http.services.fkw-admin-web.loadbalancer.server.port=80
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.rule=Host(`${API_PUBLIC_HOST:?}`) && PathPrefix(`/admin`)
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.middlewares=fkw-admin-strip@docker
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.service=fkw-admin-web
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.tls.certresolver=dnspod
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.tls.domains[0].main=tbpf.com
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.tls.domains[0].sans=*.tbpf.com

networks:
  proxy:
    external: true

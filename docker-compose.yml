# fskw Docker 编排（真源在仓库根；主机复制到 /docker/fskw-test 与 /docker/fskw）。
#
# 测试：cd /docker/fskw-test && cp -f server/.env .env && docker compose --profile admin --profile feishu --profile worker up -d --build
# 正式：cd /docker/fskw && cp -f server/.env .env && docker compose --profile admin --profile feishu --profile worker up -d --build
#
# 前置：docker network create proxy；复用 gqs-mysql / gqs-redis
# Compose ${VAR} 只读栈根 ./.env；容器变量读 env_file: ./server/.env、./python/.env

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.9-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    restart: unless-stopped
    env_file:
      - ./server/.env
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.loadbalancer.server.port=8000
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.rule=Host(`${API_PUBLIC_HOST:?}`)
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.tls.certresolver=dnspod
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.tls.domains[0].main=tbpf.com
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.tls.domains[0].sans=*.tbpf.com
      - traefik.http.routers.${TRAEFIK_API_ROUTER_NAME:-fkw-api}.service=${TRAEFIK_API_ROUTER_NAME:-fkw-api}

  sync-api:
    profiles: ["worker"]
    build:
      context: ./python
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.9-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    restart: unless-stopped
    env_file:
      - ./python/.env
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.${TRAEFIK_SYNC_ROUTER_NAME:-fkw-sync}.loadbalancer.server.port=8765
      - traefik.http.routers.${TRAEFIK_SYNC_ROUTER_NAME:-fkw-sync}.rule=Host(`${API_PUBLIC_HOST:?}`) && PathPrefix(`/api/v1`)
      - traefik.http.routers.${TRAEFIK_SYNC_ROUTER_NAME:-fkw-sync}.priority=100
      - traefik.http.routers.${TRAEFIK_SYNC_ROUTER_NAME:-fkw-sync}.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_SYNC_ROUTER_NAME:-fkw-sync}.tls.certresolver=dnspod
      - traefik.http.routers.${TRAEFIK_SYNC_ROUTER_NAME:-fkw-sync}.tls.domains[0].main=tbpf.com
      - traefik.http.routers.${TRAEFIK_SYNC_ROUTER_NAME:-fkw-sync}.tls.domains[0].sans=*.tbpf.com
      - traefik.http.routers.${TRAEFIK_SYNC_ROUTER_NAME:-fkw-sync}.service=${TRAEFIK_SYNC_ROUTER_NAME:-fkw-sync}

  celery-worker:
    profiles: ["worker"]
    build:
      context: ./python
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./python/.env
    command:
      [
        "celery",
        "-A",
        "social_platform.tasks.celery_app:celery_app",
        "worker",
        "-l",
        "info",
        "-P",
        "gevent",
        "-c",
        "4",
        "--prefetch-multiplier=1",
      ]
    networks:
      - proxy

  admin-web:
    profiles: ["admin"]
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./public/admin:/usr/share/nginx/html:ro
      - ./deploy/admin-static/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.fkw-admin-web.loadbalancer.server.scheme=http
      - traefik.http.services.fkw-admin-web.loadbalancer.server.port=80
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.service=fkw-admin-web
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.rule=Host(`${ADMIN_PUBLIC_HOST:?}`)
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.tls.certresolver=dnspod
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.tls.domains[0].main=tbpf.com
      - traefik.http.routers.${TRAEFIK_ADMIN_ROUTER_NAME:-fkw-admin}.tls.domains[0].sans=*.tbpf.com

  feishu-web:
    profiles: ["feishu"]
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./public/feishu:/usr/share/nginx/html:ro
      - ./deploy/feishu-static/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.fkw-feishu-web.loadbalancer.server.scheme=http
      - traefik.http.services.fkw-feishu-web.loadbalancer.server.port=80
      - traefik.http.routers.${TRAEFIK_FEISHU_ROUTER_NAME:-fkw-feishu}.service=fkw-feishu-web
      - traefik.http.routers.${TRAEFIK_FEISHU_ROUTER_NAME:-fkw-feishu}.rule=Host(`${FEISHU_PUBLIC_HOST:?}`)
      - traefik.http.routers.${TRAEFIK_FEISHU_ROUTER_NAME:-fkw-feishu}.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_FEISHU_ROUTER_NAME:-fkw-feishu}.tls.certresolver=dnspod
      - traefik.http.routers.${TRAEFIK_FEISHU_ROUTER_NAME:-fkw-feishu}.tls.domains[0].main=tbpf.com
      - traefik.http.routers.${TRAEFIK_FEISHU_ROUTER_NAME:-fkw-feishu}.tls.domains[0].sans=*.tbpf.com

networks:
  proxy:
    external: true

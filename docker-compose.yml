# fskw 公共编排：不启 mysql/redis（复用 gqs-mysql / gqs-redis）。
# 测试：docker compose -f docker-compose.yml -f docker-compose.test.yml --profile admin --profile feishu up -d --build
# 正式：docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile admin --profile feishu up -d --build

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: python:3.11-slim
        PIP_INDEX_URL: ""
    restart: unless-stopped
    env_file:
      - ./server/.env
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - proxy

  admin-web:
    profiles: ["admin"]
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./public/admin:/usr/share/nginx/html:ro
      - ./deploy/admin-static/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy

  feishu-web:
    profiles: ["feishu"]
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./public/feishu:/usr/share/nginx/html:ro
      - ./deploy/feishu-static/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy

networks:
  proxy:
    external: true
